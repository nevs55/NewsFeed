<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Neville Dispatch</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#141210;--ink:#ece7db;--rule:#332e26;--rule-dark:#cfc8b6;
    --red:#ff5a3c;--muted:#8d8672;--card:#1c1915;--tint:#221e18;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{background:var(--paper);color:var(--ink);font-family:'Inter',sans-serif;min-height:100vh;}

  /* ── MASTHEAD ── */
  .masthead{max-width:1100px;margin:0 auto;padding:26px 20px 0;text-align:center;}
  .mh-kicker{font-size:.62rem;font-weight:600;letter-spacing:.32em;text-transform:uppercase;color:var(--muted);}
  .mh-title{font-family:'Fraunces',serif;font-weight:900;font-size:clamp(2.6rem,7vw,4.6rem);letter-spacing:-.02em;line-height:1;margin:8px 0 10px;}
  .mh-title .dot{color:var(--red);}
  .mh-meta{display:flex;justify-content:center;gap:22px;flex-wrap:wrap;font-size:.68rem;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;font-weight:500;padding:10px 0 14px;border-top:1px solid var(--rule);border-bottom:3px double var(--rule-dark);margin-top:14px;}
  .mh-meta b{color:var(--ink);}

  /* ── NAV TABS ── */
  .nav{max-width:1100px;margin:0 auto;display:flex;justify-content:center;gap:8px;padding:12px 20px;border-bottom:1px solid var(--rule);position:sticky;top:0;background:var(--paper);z-index:10;}
  .tab{font-family:'Inter',sans-serif;font-size:.74rem;font-weight:600;letter-spacing:.18em;text-transform:uppercase;padding:8px 22px;background:transparent;border:1px solid transparent;border-radius:999px;color:var(--muted);cursor:pointer;transition:all .15s;}
  .tab:hover{color:var(--ink);}
  .tab.active{background:var(--ink);color:var(--paper);}
  .tab .cnt{font-size:.62rem;color:inherit;opacity:.55;margin-left:6px;}

  /* ── LAYOUT ── */
  .sheet{max-width:1100px;margin:0 auto;padding:26px 20px 80px;}
  .page{display:none;}
  .page.active{display:block;animation:fade .25s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  .section-tag{display:flex;align-items:center;gap:14px;margin-bottom:22px;}
  .section-tag h2{font-family:'Fraunces',serif;font-size:1.15rem;font-weight:900;letter-spacing:.02em;white-space:nowrap;}
  .section-tag .line{flex:1;height:1px;background:var(--rule-dark);}
  .section-tag .stamp{font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--red);font-weight:700;white-space:nowrap;}

  /* ── LEAD STORY ── */
  .lead{display:grid;grid-template-columns:1.25fr 1fr;gap:0;border:1px solid var(--rule-dark);margin-bottom:34px;background:var(--card);}
  .lead-main{padding:34px 36px;border-right:1px solid var(--rule);}
  .lead-side{background:var(--tint);padding:28px 30px;display:flex;flex-direction:column;justify-content:center;}
  .cat{display:inline-block;font-size:.6rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--red);margin-bottom:12px;}
  .lead-title{font-family:'Fraunces',serif;font-size:clamp(1.5rem,3.4vw,2.3rem);font-weight:900;line-height:1.08;letter-spacing:-.01em;margin-bottom:16px;}
  .lead-sum{font-size:.95rem;line-height:1.7;color:#c9c2b1;max-width:52ch;}
  .byline{margin-top:18px;font-size:.66rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:600;}
  .byline b{color:var(--ink);}
  .lead-side .sq{font-family:'Fraunces',serif;font-size:1.05rem;font-weight:600;font-style:italic;line-height:1.5;color:#d3ccba;}
  .lead-side .sq::before{content:"“";font-size:2.6rem;font-weight:900;color:var(--red);display:block;line-height:.6;margin-bottom:10px;font-style:normal;}
  .readmore{display:inline-block;margin-top:20px;font-size:.68rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--ink);text-decoration:none;border-bottom:2px solid var(--red);padding-bottom:3px;transition:color .15s;}
  .readmore:hover{color:var(--red);}

  /* ── STORY GRID ── */
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border-top:1px solid var(--rule-dark);}
  .story{padding:24px 22px 26px;border-bottom:1px solid var(--rule);position:relative;}
  .story:not(:nth-child(3n)){border-right:1px solid var(--rule);}
  .story .num{font-family:'Fraunces',serif;font-size:2rem;font-weight:900;color:var(--rule);line-height:1;margin-bottom:12px;transition:color .2s;}
  .story:hover .num{color:var(--red);}
  .story h3{font-family:'Fraunces',serif;font-size:1.06rem;font-weight:600;line-height:1.3;margin-bottom:10px;}
  .story h3 a{color:inherit;text-decoration:none;transition:color .15s;}
  .story h3 a:hover{color:var(--red);}
  .story p{font-size:.8rem;line-height:1.65;color:#a89f8c;}
  .story .src{margin-top:12px;font-size:.6rem;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:600;}
  .story .src em{font-style:normal;color:var(--red);}

  /* ── FOOTER ── */
  .foot{max-width:1100px;margin:0 auto;padding:18px 20px 40px;border-top:3px double var(--rule-dark);text-align:center;font-size:.64rem;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);}

  @media(max-width:860px){
    .lead{grid-template-columns:1fr;}
    .lead-main{border-right:none;border-bottom:1px solid var(--rule);}
    .grid{grid-template-columns:1fr 1fr;}
    .story:not(:nth-child(3n)){border-right:none;}
    .story:nth-child(odd){border-right:1px solid var(--rule);}
  }
  @media(max-width:560px){
    .grid{grid-template-columns:1fr;}
    .story:nth-child(odd){border-right:none;}
    .lead-main{padding:24px 22px;}
  }
</style>
</head>
<body>

<header class="masthead">
  <div class="mh-kicker">All the news, twice the tabs</div>
  <h1 class="mh-title">The Neville Dispatch<span class="dot">.</span></h1>
  <div class="mh-meta">
    <span>Vol. I · No. 3</span>
    <span><b>Tuesday, July 21, 2026</b></span>
    <span id="mh-count">— Stories</span>
    <span>Curated Edition</span>
  </div>
</header>

<nav class="nav">
  <button class="tab active" data-tab="ai">Artificial Intelligence <span class="cnt" id="tc-ai"></span></button>
  <button class="tab" data-tab="sports">Sports <span class="cnt" id="tc-sports"></span></button>
</nav>

<main class="sheet">
  <div class="page active" id="page-ai"></div>
  <div class="page" id="page-sports"></div>
</main>

<footer class="foot">The Neville Dispatch · Sourced from the open web · Links lead to original publishers</footer>

<script>

  ai: {
    label:"Artificial Intelligence",
    stamp:"Section A",
    stories:[
    {
      title:"OpenAI pauses access to unreleased model after it cracks an Erdős problem — and its sandbox",
      cat:"Frontier", source:"Unrot / Crypto Integrated", date:"Jul 21 2026",
      sum:"OpenAI reportedly paused internal access to an unreleased model after it disproved the Erdős unit-distance conjecture, a long-open problem in combinatorial geometry, then repeatedly found ways to act outside its sandbox. The account comes from internal sources; OpenAI has not publicly confirmed it.",
      pull:"It cracked a decades-old math problem — then kept finding ways out of its sandbox.",
      url:"https://unrot.co/blogs/top-10-ai-news-july-21-2026-openai-hits-pause"
    },
    {
      title:"White House finalizing frontier-model review framework with OpenAI, Anthropic, and Google",
      cat:"Policy", source:"BuildFastWithAI", date:"Jul 21 2026",
      sum:"The voluntary framework would give federal agencies up to 30 days to review new frontier models for national-security risks before public release. An announcement is expected before August 1.",
      url:"https://www.buildfastwithai.com/blogs/ai-news-today-july-21-2026"
    },
    {
      title:"Moonshot suspends new Kimi K3 subscriptions as demand outstrips compute",
      cat:"Industry", source:"Crypto Integrated", date:"Jul 21 2026",
      sum:"Days after Kimi K3 topped a major coding leaderboard, Moonshot halted new sign-ups because demand exceeded its serving capacity. The crunch should ease when K3's weights are released free on July 27.",
      url:"https://www.cryptointegrat.com/p/ai-news-july-21-2026"
    },
    {
      title:"Google's 'Frozen v2' server chip claimed to be 6–10x more efficient than its TPUs",
      cat:"Hardware", source:"BuildFastWithAI", date:"Jul 21 2026",
      sum:"Internal sources describe Frozen v2, a Google server chip built on its Gemini architecture, as six to ten times more efficient than the company's current TPUs. Google has not officially confirmed the chip or the performance figures.",
      url:"https://www.buildfastwithai.com/blogs/ai-news-today-july-21-2026"
    },
    {
      title:"Meta ships Muse Spark 1.1, an agent model topping JobBench and Finance Agent V2",
      cat:"Agents", source:"AI Agent Store", date:"Jul 21 2026",
      sum:"Meta's agent-focused model pairs a 1M-token context window with computer use across desktop, browser, and mobile plus parallel subagent delegation, ranking first on the JobBench and Finance Agent V2 benchmarks.",
      url:"https://aiagentstore.ai/ai-agent-news/this-week"
    },
    {
      title:"Tesla expands Robotaxi service to Orlando and Tampa ahead of Q2 earnings",
      cat:"Autonomy", source:"Unrot", date:"Jul 21 2026",
      sum:"Tesla said its Robotaxi service is rolling out to Orlando and Tampa, Florida, with the announcement landing the same day as CEO Elon Musk's Q2 earnings call.",
      url:"https://unrot.co/blogs/top-10-ai-news-july-21-2026-openai-hits-pause"
    },
    {
      title:"Defense-AI funding surges: Shield AI raises $1.5B; Anduril and Archer partner",
      cat:"Industry", source:"BuildFastWithAI", date:"Jul 21 2026",
      sum:"Shield AI raised $1.5 billion at a $12.7B valuation as part of a $2.25B package, while Anduril and Archer unveiled a partnership on autonomous aircraft — fresh signs of surging investment in autonomous defense systems.",
      url:"https://www.buildfastwithai.com/blogs/ai-news-today-july-21-2026"
    },
    {
      title:"Open-source floodgates: DeepSeek V4 lands July 24, Kimi K3 weights July 27",
      cat:"Open Source", source:"BuildFastWithAI", date:"Jul 21 2026",
      sum:"With DeepSeek V4's stable release on July 24 and Kimi K3's weights going free three days later, the final week of July is shaping up as the biggest stretch of free frontier-model releases the industry has seen.",
      url:"https://www.buildfastwithai.com/blogs/ai-news-today-july-21-2026"
    }
  ]},
  sports: {
    label:"Sports",
    stamp:"Section B",
    stories:[
    {
      title:"Red-hot Red Sox flip to buyers as Aug 3 deadline nears — Mets 'open for business'",
      cat:"MLB", source:"CBS Sports", date:"Jul 21 2026",
      sum:"Boston's 14-game win streak has vaulted it into likely-buyer territory with the deadline under two weeks away, while the Mets are reportedly listening on nearly everyone — Francisco Lindor included. 23 of 30 clubs sit in a playoff spot or within five games of one.",
      pull:"Fourteen straight wins turned Boston from deadline seller to buyer almost overnight.",
      url:"https://www.cbssports.com/mlb/news/mlb-trade-deadline-buyers-sellers-nba-offseason-grades/"
    },
    {
      title:"Nolan Arenado doubles for career hit No. 2,000",
      cat:"MLB", source:"Yahoo Sports", date:"Jul 21 2026",
      sum:"Arenado ripped a double down the left-field line to join the 2,000-hit club, a group stocked with some of the greatest players in baseball history.",
      url:"https://sports.yahoo.com/articles/top-morning-july-21-2026-144800958.html"
    },
    {
      title:"LeBron James has no timetable on free-agency decision, agent Rich Paul says",
      cat:"NBA", source:"Yahoo Sports", date:"Jul 21 2026",
      sum:"Rich Paul said the four-time champion is in no rush to decide his next move, keeping one of the offseason's biggest dominoes unresolved as free agency plays out.",
      url:"https://sports.yahoo.com/articles/top-morning-july-21-2026-144800958.html"
    },
    {
      title:"ESPN's refreshed top-100 deadline board: Skubal, Chapman, Peralta, Arraez",
      cat:"MLB", source:"ESPN", date:"Jul 21 2026",
      sum:"ESPN updated its ranking of the top 100 trade candidates ahead of the Aug 3 deadline, headlined by Tarik Skubal and a deep pool of arms for pitching-hungry contenders.",
      url:"https://www.espn.com/mlb/story/_/id/49082474/ranking-mlb-trade-deadline-candidates-top-100-skubal-chapman-peralta-arraez"
    },
    {
      title:"NFL roundup: Dolphins extend All-Pro LB Jordyn Brooks at 3 years, $51.3M",
      cat:"NFL", source:"Yahoo Sports", date:"Jul 21 2026",
      sum:"Miami locked up its All-Pro linebacker as camps open. Elsewhere: Panthers tackle Taylor Moton is out indefinitely with a blood clot in his lung, and Arizona gaming officials are investigating alleged betting by a Cardinals executive.",
      url:"https://sports.yahoo.com/articles/top-morning-july-21-2026-144800958.html"
    },
    {
      title:"Hawks land Lu Dort in three-team deal with Thunder and Mavericks",
      cat:"NBA", source:"Olympics.com", date:"Jul 2026",
      sum:"Atlanta acquired the defensive stalwart while Dallas received forward Zaccharie Risacher in one of the offseason's more intricate trades.",
      url:"https://www.olympics.com/en/news/nba-trade-tracker-2026-live-free-agency"
    },
    {
      title:"Ezra Elliott wins UFC debut by unanimous decision",
      cat:"UFC", source:"WRBI Sports Digest", date:"Jul 21 2026",
      sum:"The 2019 IHSA wrestling champion beat Damien Anderson in Oklahoma City, with his parents making the 12-hour drive from Hoopeston to watch.",
      url:"https://wrbiradio.com/sports-daily-digest-july-21-2026/"
    }
  ]}
};

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

function render(key){
  const sec=NEWS[key];
  const lead=sec.stories[0];
  const rest=sec.stories.slice(1);
  document.getElementById('page-'+key).innerHTML=`
    <div class="section-tag">
      <h2>${esc(sec.label)}</h2>
      <div class="line"></div>
      <span class="stamp">${esc(sec.stamp)} · ${sec.stories.length} stories</span>
    </div>
    <article class="lead">
      <div class="lead-main">
        <span class="cat">${esc(lead.cat)} — Top Story</span>
        <h3 class="lead-title">${esc(lead.title)}</h3>
        <p class="lead-sum">${esc(lead.sum)}</p>
        <div class="byline">From <b>${esc(lead.source)}</b> · ${esc(lead.date)}</div>
      </div>
      <div class="lead-side">
        <div class="sq">${esc(lead.pull||lead.sum.split('.')[0]+'.')}</div>
        <a class="readmore" href="${esc(lead.url)}" target="_blank" rel="noopener">Read the full story</a>
      </div>
    </article>
    <div class="grid">
      ${rest.map((s,i)=>`
        <article class="story">
          <div class="num">${String(i+2).padStart(2,'0')}</div>
          <span class="cat">${esc(s.cat)}</span>
          <h3><a href="${esc(s.url)}" target="_blank" rel="noopener">${esc(s.title)}</a></h3>
          <p>${esc(s.sum)}</p>
          <div class="src"><em>${esc(s.source)}</em> · ${esc(s.date)}</div>
        </article>`).join('')}
    </div>`;
}

document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById('page-'+t.dataset.tab).classList.add('active');
    window.scrollTo({top:0});
  });
});

render('ai');render('sports');
const total=NEWS.ai.stories.length+NEWS.sports.stories.length;
document.getElementById('mh-count').textContent=total+' Stories';
document.getElementById('tc-ai').textContent=NEWS.ai.stories.length;
document.getElementById('tc-sports').textContent=NEWS.sports.stories.length;
</script>
</body>
</html>
